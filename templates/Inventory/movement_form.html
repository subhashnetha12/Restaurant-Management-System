{% extends base_template %}{% block content %}<div class="container py-4" style="max-width:800px"><h2>Record stock movement</h2>{% include 'Inventory/_nav.html' %}<div class="card p-4"><form method="post">{% csrf_token %}{% if item %}<p><b>Item:</b> {{ item.item_name }} — available {{ item.quantity }} {{ item.unit }}</p>{% else %}<label>Stock item</label><select name="inventory_item" required>{% for row in items %}<option value="{{ row.pk }}">{{ row.item_name }} ({{ row.quantity }} {{ row.unit }})</option>{% endfor %}</select>{% endif %}{{ form.as_p }}<button class="btn btn-primary">Record movement</button></form></div></div><style>input,select,textarea{width:100%;padding:.5rem}</style>{% endblock %}
