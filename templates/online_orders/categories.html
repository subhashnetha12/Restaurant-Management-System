{% extends 'online_orders/base.html' %}

{% block title %}Select Category{% endblock %}

{% block content %}
<section id="categories-section" class="container">
    <h4 class="text-center mb-4 fw-semibold">Select a Category</h4>

    <div class="row justify-content-center mb-4">
        <div class="col-md-4 px-3">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-white border-end-0">
                    <i class="fas fa-search text-muted"></i>
                </span>
                <input type="text" id="categorySearch" class="form-control border-start-0"
                    placeholder="Search categories...">
            </div>
        </div>
    </div>

    <div class="row" id="category-list">
        {% for category in cat_det %}
        <div class="col-6 col-md-3 mb-4 category-item">
            <a href="{% url 'menu_items' category.id %}">
                <div class="category-card text-center p-2 border shadow-sm bg-white hover-shadow">
                    <div class="category-image-wrapper mx-auto mb-2">
                        <img src="{{ category.image.url }}" class="category-img" alt="{{ category.name }}">
                    </div>
                    <div class="category-title fw-semibold">{{ category.name }}</div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    // Optional: implement search filter on categorySearch input
    const categorySearch = document.getElementById('categorySearch');
    categorySearch.addEventListener('input', () => {
        const filter = categorySearch.value.toLowerCase();
        document.querySelectorAll('.category-item').forEach(item => {
            const text = item.querySelector('.category-title').textContent.toLowerCase();
            item.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>
{% endblock %}
